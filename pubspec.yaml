name: pfc_app
description: PFC — Pakistan Fragrance Community
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.5.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Typography
  google_fonts: ^6.2.1

  # Environment variables
  flutter_dotenv: ^5.1.0

  # Utilities
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.9
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - .env
